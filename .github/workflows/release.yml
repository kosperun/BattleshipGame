name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pygame pyinstaller

      - name: Build icon.icns
        run: |
          mkdir -p src/media/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size src/media/icon.png --out "src/media/icon.iconset/icon_${size}x${size}.png"
            double=$((size * 2))
            sips -z $double $double src/media/icon.png --out "src/media/icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns src/media/icon.iconset --output src/media/icon.icns

      - name: Build app bundle
        run: |
          pyinstaller \
            --name BattleshipGame \
            --windowed \
            --icon src/media/icon.icns \
            --paths src \
            --add-data "src/media:media" \
            src/main.py

      - name: Package as DMG
        run: |
          mkdir -p dist/dmg
          cp -r dist/BattleshipGame.app dist/dmg/
          ln -s /Applications dist/dmg/Applications
          hdiutil create \
            -volname BattleshipGame \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            BattleshipGame.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: BattleshipGame.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pygame pyinstaller pillow

      - name: Build icon.ico
        run: |
          python -c "
          from PIL import Image
          img = Image.open('src/media/icon.png').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          imgs = [img.resize(s, Image.LANCZOS) for s in sizes]
          imgs[0].save('src/media/icon.ico', format='ICO', append_images=imgs[1:])
          "

      - name: Build exe
        run: |
          pyinstaller `
            --name BattleshipGame `
            --windowed `
            --icon src/media/icon.ico `
            --paths src `
            --add-data "src/media;media" `
            src/main.py

      - name: Zip exe
        run: Compress-Archive -Path dist\BattleshipGame -DestinationPath BattleshipGame-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: BattleshipGame-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libfreetype6-dev

      - name: Install dependencies
        run: pip install pygame pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --name BattleshipGame \
            --windowed \
            --icon src/media/icon.png \
            --paths src \
            --add-data "src/media:media" \
            src/main.py

      - name: Package as tar.gz
        run: tar -czf BattleshipGame-linux.tar.gz -C dist BattleshipGame

      - uses: actions/upload-artifact@v4
        with:
          name: linux-targz
          path: BattleshipGame-linux.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BattleshipGame.dmg
            BattleshipGame-windows.zip
            BattleshipGame-linux.tar.gz
          generate_release_notes: true
